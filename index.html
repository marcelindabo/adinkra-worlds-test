const labels={fr:{home:'Accueil',learn:'Apprendre',play:'Jouer',scan:'Scanner',draw:'Dessiner',origins:'Origines',products:'Nos produits',partners:'Partenaires',collection:'Collection',child:'Mode enfant',adult:'Mode adulte',choose:'Choisir un mode',daily:'Sapientogramme du jour',question:'Quel symbole signifie :',correct:'Bonne réponse',wrong:'Mauvaise réponse',next:'Suivant',score:'Score',xp:'Récompense XP',badge:'Badge actuel',cards:'Cartes débloquées',nextReward:'Prochaine récompense',meaning:'Signification',explain:'Explication',poly:'Caractère polysémique',proverb:'Proverbe',buy:'Acheter',upload:'Choisir une photo',analyze:'Analyser',restart:'Recommencer',clear:'Effacer',validate:'Valider',drawHelp:'Dessinez le sapientogramme avec le doigt.',originText:'Les Adinkra sont des signes de sagesse du peuple Akan. Ils transmettent des valeurs, des proverbes et des leçons de vie.',partnerText:'Partenaires culturels et éducatifs : Gisèle Sylvie DABO-BASSENE, Régis Ngago DABO, Dr Marcelin DABO, Amélie DABO-SAMB et Maurice DABO.',shopText:'Retrouvez les livres et produits Adinkra sur Dabo Academy.',unlocked:'Débloqué'},en:{home:'Home',learn:'Learn',play:'Play',scan:'Scan',draw:'Draw',origins:'Origins',products:'Our products',partners:'Partners',collection:'Collection',child:'Child mode',adult:'Adult mode',choose:'Choose a mode',daily:'Sapientogram of the day',question:'Which symbol means:',correct:'Correct',wrong:'Wrong answer',next:'Next',score:'Score',xp:'XP reward',badge:'Current badge',cards:'Unlocked cards',nextReward:'Next reward',meaning:'Meaning',explain:'Explanation',poly:'Polysemic character',proverb:'Proverb',buy:'Buy',upload:'Choose a photo',analyze:'Analyze',restart:'Restart',clear:'Clear',validate:'Validate',drawHelp:'Draw the sapientogram with your finger.',originText:'Adinkra are wisdom signs from the Akan people. They transmit values, proverbs and life lessons.',partnerText:'Cultural and educational partners: Gisèle Sylvie DABO-BASSENE, Régis Ngago DABO, Dr Marcelin DABO, Amélie DABO-SAMB and Maurice DABO.',shopText:'Find Adinkra books and products on Dabo Academy.',unlocked:'Unlocked'}};
let state={screen:'home',lang:'fr',mode:'adult',selected:symbols[new Date().getDate()%symbols.length],score:Number(localStorage.getItem('adinkra-worlds-xp')||0),q:0,feedback:'',game:'quiz',memory:null,match:null,preview:null,drawSymbol:symbols[0]};
const $=s=>document.querySelector(s), app=$('#app');
function t(){return labels[state.lang]||labels.fr} function save(){localStorage.setItem('adinkra-worlds-xp',state.score)} function svg(id,color){return (officialSvg[id]||'').replaceAll('fill="black"',`fill="${color}"`)}
function symBox(s,sz=80){return `<div class="symbolBox" style="background:${s.soft};width:${sz}px;height:${sz}px"><span style="width:${sz*.72}px;height:${sz*.72}px;display:block">${svg(s.id,s.accent)}</span></div>`}
function reward(){const levels=[[0,'Débutant Akwaba'],[50,'Première carte débloquée'],[100,'Apprenti des sapientogrammes'],[200,'Gardien de la mémoire'],[350,'Explorateur Adinkra'],[500,'Carte spéciale Sankofa'],[750,'Maître des symboles'],[1000,'Sage des sapientogrammes']];let cur=levels[0],next=null;for(const l of levels){if(state.score>=l[0])cur=l; else{next=l;break}};return {cur,next,cards:Math.floor(state.score/50),progress:next?Math.round((state.score-cur[0])/(next[0]-cur[0])*100):100}}
function layout(content){const L=t();app.innerHTML=`<div class="top"><div class="brand"><button class="logo" onclick="openLink('https://daboacademy.com/')">DA</button><div><div class="title">ADINKRA WORLDS</div><div class="note">Prototype PWA · canvas</div></div></div><div class="controls"><select class="select" onchange="state.lang=this.value;render()"><option value="fr" ${state.lang==='fr'?'selected':''}>FR</option><option value="en" ${state.lang==='en'?'selected':''}>EN</option></select><button class="mode" onclick="state.mode=state.mode==='child'?'adult':'child';render()">${state.mode==='child'?L.adult:L.child}</button></div></div><main class="main">${content}</main><nav class="nav">${['home','learn','play','origins','products'].map(k=>`<button class="${state.screen===k?'active':''}" onclick="go('${k}')">${{home:'⌂',learn:'☰',play:'🎮',origins:'✦',products:'🛍'}[k]}<br>${L[k]}</button>`).join('')}</nav>`}
function go(s){state.screen=s;state.feedback='';render()} function back(){go('home')} function openLink(u){window.open(u,'_blank','noopener')}
function header(title){return `<div class="back"><button onclick="back()">‹</button><h2 style="margin:0;font-size:24px">${title}</h2></div>`}
function home(){const L=t(), r=reward(), s=state.selected;layout(`<div class="card"><div class="hero">Akwaba</div><div style="margin-top:14px" class="label">${L.choose}</div><div class="grid2" style="margin-top:10px"><button class="btn" onclick="state.mode='child';render()">${L.child}<div class="small">Apprendre en s'amusant</div></button><button class="btn" onclick="state.mode='adult';render()">${L.adult}<div class="small">Comprendre en profondeur</div></button></div></div><div class="grid2" style="margin-top:12px">${[['learn','📚'],['play','🎮'],['scan','▣'],['draw','✎'],['origins','✦'],['products','🛍'],['partners','👥']].map(([k,i])=>`<button class="btn" onclick="go('${k}')">${i}<br>${L[k]}</button>`).join('')}</div><div class="card" style="margin-top:12px;background:var(--brown);color:white"><div class="between"><div><div class="label" style="color:#fde68a">${L.xp}</div><div style="font-size:26px;font-weight:1000">${state.score} XP</div><div class="small" style="color:white">${L.cards}: ${r.cards}</div></div><div class="pill">${r.cur[1]}</div></div><div class="bar" style="margin-top:12px"><i style="width:${r.progress}%"></i></div><div class="small" style="color:white;margin-top:8px">${L.nextReward}: ${r.next?r.next[1]:r.cur[1]}</div></div><div class="section">${L.daily}</div><button class="card row" style="width:100%;text-align:left" onclick="detail('${s.id}')">${symBox(s,112)}<div><h2 style="margin:0">${s.name}</h2><b style="color:${s.accent}">${s.short}</b><p class="small">${s.detail}</p></div></button><div class="grid4" style="margin-top:12px">${symbols.map(x=>`<button class="symBtn" onclick="state.selected=symbols.find(s=>s.id==='${x.id}');render()">${symBox(x,52)}<br>${x.name}</button>`).join('')}</div>`)}
function learn(){const L=t();layout(header(L.learn)+`<div class="card small">Prototype fidèle : SVG validés dans le canvas. V1 prévue : 103 SVG officiels.</div><div class="grid2" style="margin-top:12px">${symbols.map(s=>`<button class="btn" onclick="detail('${s.id}')"><center>${symBox(s,112)}</center><h3>${s.name}</h3><div class="small">${s.short}</div></button>`).join('')}</div>`)}
function detail(id){state.screen='detail';state.selected=symbols.find(s=>s.id===id)||state.selected;render()} function detailScreen(){const L=t(),s=state.selected;layout(header(s.name)+`<div class="card" style="text-align:center">${symBox(s,176)}<h1>${s.name}</h1><b style="color:${s.accent}">${s.short}</b></div>${[[L.meaning,s.meaning],[L.explain,s.detail],[L.poly,s.poly],[L.proverb,'“'+s.proverb+'”']].map(([a,b])=>`<div class="card info"><div class="label">${a}</div><p>${b}</p></div>`).join('')}<button class="btn primary" style="margin-top:12px;width:100%" onclick="openLink('https://daboacademy.com/boutique/')">${L.buy}</button>`)}
function play(){const L=t(); if(state.game==='quiz') return quiz(); if(state.game==='memory') return memory(); if(state.game==='match') return match(); layout(header(L.play)+`<div class="grid2">${['quiz','memory','match','draw'].map(g=>`<button class="btn" onclick="state.game='${g}';render()">${g}</button>`).join('')}</div>`)}
function gameTabs(){return `<div class="grid2" style="margin-bottom:12px">${['quiz','memory','match','draw'].map(g=>`<button class="btn ${state.game===g?'primary':''}" onclick="state.game='${g}';render()">${g}</button>`).join('')}</div>`}
function quiz(){const L=t(),cur=symbols[state.q%symbols.length];layout(header(L.play)+gameTabs()+`<div class="card" style="background:var(--brown);color:white"><div class="small" style="color:white">${L.score}</div><h2>${state.score} XP</h2></div><div class="card" style="margin-top:12px"><div class="label">${L.question}</div><h3>${cur.meaning}</h3></div><div class="grid2" style="margin-top:12px">${symbols.map(s=>`<button class="btn" onclick="answer('${s.id}')"><center>${symBox(s,76)}</center><b>${s.name}</b></button>`).join('')}</div><div class="grid2" style="margin-top:12px"><div class="feedback ${state.feedback===L.correct?'good':state.feedback? 'bad':'ghost'}">${state.feedback||'—'}</div><button class="btn primary" onclick="state.q++;state.feedback='';render()">${L.next}</button></div>`)} function answer(id){const L=t(),cur=symbols[state.q%symbols.length];if(state.feedback===L.correct)return;if(id===cur.id){state.score+=10;save();state.feedback=L.correct;state.selected=cur}else state.feedback=L.wrong;render()}
function memoryInit(){const deck=[...symbols,...symbols].map((s,i)=>({...s,uid:s.id+i})).sort(()=>Math.random()-.5);state.memory={deck,flip:[],match:[],moves:0,msg:''}}
function memory(){const L=t();if(!state.memory)memoryInit();const m=state.memory;layout(header(L.play)+gameTabs()+`<div class="card between"><div><div class="label">Paires</div><h2>${m.match.length}/${symbols.length}</h2></div><button class="btn primary" onclick="memoryInit();render()">${L.restart}</button><div><div class="label">Coups</div><h2>${m.moves}</h2></div></div><div class="grid4" style="margin-top:12px">${m.deck.map(c=>{let vis=m.flip.includes(c.uid)||m.match.includes(c.id);return `<button class="symBtn" onclick="flip('${c.uid}')" style="height:78px;background:${vis?'white':'var(--brown)'}">${vis?symBox(c,56):'<span style="color:white;font-size:28px">?</span>'}</button>`}).join('')}</div><div class="feedback ${m.msg==='Paire trouvée'?'good':m.msg?'bad':'ghost'}" style="margin-top:12px">${m.msg||'—'}</div>`)} function flip(uid){const m=state.memory,c=m.deck.find(x=>x.uid===uid);if(m.flip.length>=2||m.match.includes(c.id)||m.flip.includes(uid))return;m.flip.push(uid); if(m.flip.length===2){m.moves++;let [a,b]=m.flip.map(u=>m.deck.find(x=>x.uid===u)); if(a.id===b.id){m.match.push(a.id);m.msg='Paire trouvée';state.score+=10;save();setTimeout(()=>{m.flip=[];m.msg='';render()},700)}else{m.msg='Pas identiques';setTimeout(()=>{m.flip=[];m.msg='';render()},850)}} render()}
function matchInit(){state.match={sel:null,pairs:{},msg:'',meanings:[...symbols].sort(()=>Math.random()-.5)}} function match(){const L=t();if(!state.match)matchInit();const M=state.match;layout(header(L.play)+gameTabs()+`<div class="card between"><b>Relier</b><button class="btn primary" onclick="matchInit();render()">${L.restart}</button></div><div class="grid2" style="margin-top:12px"><div>${symbols.map(s=>`<button class="btn" style="width:100%;margin-bottom:8px;${M.sel===s.id?'outline:4px solid #fbbf24':''}" onclick="state.match.sel='${s.id}';render()">${s.name}</button>`).join('')}</div><div>${M.meanings.map(s=>`<button class="btn" style="width:100%;margin-bottom:8px;${Object.values(M.pairs).includes(s.id)?'opacity:.5':''}" onclick="pair('${s.id}')"><b>${s.short}</b><div class="small">${s.meaning}</div></button>`).join('')}</div></div><div class="feedback ${M.msg===L.correct?'good':M.msg?'bad':'ghost'}">${M.msg||'—'}</div>`)} function pair(id){const L=t(),M=state.match;if(!M.sel)return;if(M.sel===id&&!M.pairs[M.sel]){M.pairs[M.sel]=id;M.msg=L.correct;state.score+=10;save()}else M.msg=L.wrong;render()}
function scan(){const L=t();layout(header(L.scan)+`<div class="card"><p class="small">Importez une image puis lancez l’analyse visuelle.</p><input type="file" accept="image/*" onchange="loadPreview(event)"><div id="previewBox" style="margin-top:12px"></div><button class="btn primary" style="width:100%;margin-top:12px" onclick="fakeScan()">${L.analyze}</button></div>`); if(state.preview) $('#previewBox').innerHTML=`<img src="${state.preview}" style="max-width:100%;border-radius:20px">`}
function loadPreview(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{state.preview=r.result;render()};r.readAsDataURL(f)} function fakeScan(){const s=symbols[Math.floor(Math.random()*symbols.length)];state.selected=s;showModal(`<h2>Résultat du scan</h2><div class="row">${symBox(s,110)}<div><h2>${s.name}</h2><b>Correspondance estimée : 78%</b><p>${s.meaning}</p></div></div>`)}
function draw(){const L=t(),s=state.drawSymbol;layout(header(L.draw)+`<div class="card"><p>${L.drawHelp}</p><div class="grid4">${symbols.map(x=>`<button class="symBtn" onclick="state.drawSymbol=symbols.find(s=>s.id==='${x.id}');render()">${symBox(x,52)}</button>`).join('')}</div><h3>${s.name}</h3><div style="position:relative"><div style="position:absolute;inset:0;display:grid;place-items:center;opacity:.12">${symBox(s,260)}</div><canvas id="drawCanvas" class="canvas" width="320" height="330"></canvas></div><div class="grid2" style="margin-top:10px"><button class="btn" onclick="clearCanvas()">${L.clear}</button><button class="btn primary" onclick="scoreDraw()">${L.validate}</button></div></div>`);setupCanvas()}
function setupCanvas(){const c=$('#drawCanvas');if(!c)return;const ctx=c.getContext('2d');let d=false;function p(e){const r=c.getBoundingClientRect();return{x:(e.clientX-r.left)/r.width*c.width,y:(e.clientY-r.top)/r.height*c.height}};c.onpointerdown=e=>{d=true;ctx.beginPath();let q=p(e);ctx.moveTo(q.x,q.y)};c.onpointermove=e=>{if(!d)return;let q=p(e);ctx.lineWidth=9;ctx.lineCap='round';ctx.strokeStyle='#111';ctx.lineTo(q.x,q.y);ctx.stroke()};c.onpointerup=()=>d=false;c.onpointerleave=()=>d=false} function clearCanvas(){const c=$('#drawCanvas');c.getContext('2d').clearRect(0,0,c.width,c.height)} function scoreDraw(){showModal(`<h2>Score du dessin</h2><p>Ressemblance estimée : <b>${65+Math.floor(Math.random()*30)}%</b></p>`)}
function origins(){const L=t();layout(header(L.origins)+`<div class="card"><h2>Origine et histoire des Adinkra</h2><p>${L.originText}</p></div><div class="card" style="margin-top:12px"><h3>Sapientogramme</h3><p>Le terme sapientogramme est un néologisme introduit par madame Euzébia Amélie DABO-SAMB. Chaque symbole reflète un sens profond de la sagesse.</p></div>`)}
function products(){const L=t();layout(header(L.products)+`<div class="card" style="background:var(--brown);color:white"><h2>Dabo Academy</h2><p>${L.shopText}</p><button class="btn" onclick="openLink('https://daboacademy.com/boutique/')">${L.buy}</button></div>`)}
function partners(){const L=t();layout(header(L.partners)+`<div class="card"><h2>${L.partners}</h2><p>${L.partnerText}</p></div>`)}
function collection(){const L=t();layout(header(L.collection)+`<div class="grid2">${symbols.map(s=>`<button class="btn" onclick="detail('${s.id}')"><center>${symBox(s,92)}</center><b>${s.name}</b><div class="small">${L.unlocked}</div></button>`).join('')}</div>`)}
function showModal(html){document.body.insertAdjacentHTML('beforeend',`<div class="popup" onclick="this.remove()"><div class="modal" onclick="event.stopPropagation()"><button style="float:right;border-radius:50%;width:34px;height:34px" onclick="this.closest('.popup').remove()">×</button>${html}</div></div>`)}
function render(){ if(state.screen==='home')home(); else if(state.screen==='learn')learn(); else if(state.screen==='detail')detailScreen(); else if(state.screen==='play')play(); else if(state.screen==='scan')scan(); else if(state.screen==='draw')draw(); else if(state.screen==='origins')origins(); else if(state.screen==='products')products(); else if(state.screen==='partners')partners(); else if(state.screen==='collection')collection(); }
window.go=go;window.render=render;window.state=state;window.detail=detail;window.answer=answer;window.flip=flip;window.memoryInit=memoryInit;window.matchInit=matchInit;window.pair=pair;window.openLink=openLink;window.loadPreview=loadPreview;window.fakeScan=fakeScan;window.clearCanvas=clearCanvas;window.scoreDraw=scoreDraw;
if('serviceWorker' in navigator){navigator.serviceWorker.register('./service-worker.js').catch(()=>{})}
let deferredPrompt=null;window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;$('#install').style.display='flex'});$('#installBtn').onclick=async()=>{if(deferredPrompt){deferredPrompt.prompt();deferredPrompt=null;$('#install').style.display='none'}};$('#closeInstall').onclick=()=>$('#install').style.display='none';
render();
</script>
</body>
</html>
